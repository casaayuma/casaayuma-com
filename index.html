<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Ayuma — The house of AYUMA</title>
<meta name="description" content="Casa Ayuma — the house behind AYUMA. Botanical care, born in Baja California where the desert meets the sea. For partnerships, wholesale and press.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#F4EFE4;
    --sand:#E6DBC7;
    --terra:#BE7150;
    --sage:#8C9A82;
    --sea:#5E91A2;
    --pacific:#2A5560;
    --pacific-deep:#1F424C;
    --ink:#26302F;
    --ink-soft:#566060;
    --bone-dim:rgba(244,239,228,0.6);
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}

  body{
    font-family:'Jost',sans-serif;
    color:var(--ink);
    background:var(--bone);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  /* horizon — cooler, more institutional than the consumer site */
  .scene{
    position:fixed;
    inset:0;
    background:
      linear-gradient(
        to bottom,
        var(--bone) 0%,
        var(--bone) 32%,
        #ECE3D2 50%,
        #E8DFCC 59%,
        var(--sea) 66%,
        var(--pacific) 85%,
        var(--pacific-deep) 100%
      );
  }
  .scene::before{
    content:"";
    position:absolute;
    left:0;right:0;
    top:63%;
    height:1px;
    background:linear-gradient(to right,
      transparent 0%,
      rgba(245,240,230,0.12) 16%,
      rgba(245,240,230,0.7) 50%,
      rgba(245,240,230,0.12) 84%,
      transparent 100%);
    box-shadow:0 0 22px 4px rgba(214,228,232,0.22);
    animation:horizon 13s ease-in-out infinite;
  }
  .scene::after{
    content:"";
    position:absolute;
    left:50%;
    top:63%;
    width:min(64vw,560px);
    height:min(64vw,560px);
    transform:translate(-50%,-50%);
    background:radial-gradient(circle,
      rgba(232,224,206,0.45) 0%,
      rgba(214,222,222,0.14) 40%,
      transparent 66%);
    pointer-events:none;
    animation:haze 13s ease-in-out infinite;
  }
  @keyframes horizon{0%,100%{opacity:0.82;}50%{opacity:1;}}
  @keyframes haze{
    0%,100%{opacity:0.8;transform:translate(-50%,-50%) scale(1);}
    50%{opacity:1;transform:translate(-50%,-50.5%) scale(1.03);}
  }

  .stage{
    position:relative;
    z-index:2;
    height:100%;
    display:grid;
    grid-template-rows:1fr auto 1fr;
    align-items:center;
    justify-items:center;
    text-align:center;
    padding:clamp(1.5rem,5vh,3rem) 1.5rem;
  }

  .crown{align-self:end;padding-bottom:clamp(1.2rem,4vh,2.4rem);}
  .eyebrow{
    font-size:clamp(0.58rem,1.3vw,0.7rem);
    letter-spacing:0.44em;
    text-indent:0.44em;
    text-transform:uppercase;
    color:var(--sage);
    font-weight:500;
    margin-bottom:clamp(1.4rem,4vh,2.1rem);
  }
  /* "CASA" set small above the AYUMA wordmark — architectural lockup */
  .lockup{display:flex;flex-direction:column;align-items:center;}
  .casa{
    font-family:'Jost',sans-serif;
    font-weight:400;
    font-size:clamp(0.74rem,2vw,1.05rem);
    letter-spacing:0.62em;
    text-indent:0.62em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:clamp(0.5rem,1.6vh,0.9rem);
  }
  .wordmark{
    font-family:'Cormorant Garamond',serif;
    font-weight:300;
    font-size:clamp(3.4rem,13.5vw,9.5rem);
    line-height:0.9;
    letter-spacing:0.2em;
    text-indent:0.2em;
    color:var(--ink);
  }

  .tagline-wrap{z-index:3;max-width:36ch;}
  .tagline{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-weight:400;
    font-size:clamp(1.1rem,3.1vw,1.7rem);
    letter-spacing:0.03em;
    color:var(--ink);
    line-height:1.35;
  }

  .tide{
    align-self:start;
    padding-top:clamp(1.4rem,5vh,2.8rem);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:clamp(1.1rem,3.2vh,1.8rem);
    width:100%;
    max-width:540px;
  }
  .status{
    font-size:clamp(0.6rem,1.5vw,0.72rem);
    letter-spacing:0.4em;
    text-indent:0.4em;
    text-transform:uppercase;
    color:var(--bone);
    font-weight:400;
  }
  .channels{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:clamp(1.1rem,4vw,2.4rem);
    font-size:clamp(0.56rem,1.3vw,0.66rem);
    letter-spacing:0.3em;
    text-indent:0.3em;
    text-transform:uppercase;
    color:var(--bone-dim);
  }
  .contact{
    font-size:clamp(0.62rem,1.5vw,0.74rem);
    letter-spacing:0.22em;
    text-indent:0.22em;
    text-transform:uppercase;
    color:var(--bone);
  }
  .contact a{
    color:inherit;
    text-decoration:none;
    border-bottom:1px solid rgba(244,239,228,0.4);
    padding-bottom:2px;
    transition:opacity 0.3s ease;
  }
  .contact a:hover{opacity:0.65;}

  a:focus-visible{outline:2px solid rgba(245,240,230,0.9);outline-offset:3px;}

  @media (max-height:620px){
    body{overflow-y:auto;}
    .stage{height:auto;min-height:100%;grid-template-rows:auto auto auto;gap:2.2rem;padding-top:3rem;padding-bottom:3rem;}
    .crown,.tide{align-self:center;}
  }
  @media (prefers-reduced-motion:reduce){
    .scene::before,.scene::after{animation:none;}
  }
</style>
</head>
<body>
  <div class="scene" aria-hidden="true"></div>

  <main class="stage">
    <header class="crown">
      <p class="eyebrow">Baja California</p>
      <div class="lockup">
        <span class="casa">Casa</span>
        <h1 class="wordmark">Ayuma</h1>
      </div>
    </header>

    <div class="tagline-wrap">
      <p class="tagline">The house of botanical care, born where the desert meets the sea</p>
    </div>

    <section class="tide">
      <p class="status">Establishing soon</p>
    </section>
  </main>
</body>
</html>
